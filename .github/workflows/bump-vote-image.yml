name: Bump Vote Image Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Target image tag (include the `v` prefix, e.g., v10)"
        required: true
  push:
    branches: ["main"]
    paths:
      - "app/base/rollout.yaml"
      - "app/overlays/prod/kustomization.yaml"

jobs:
  # Manual job: open PR to bump image
  update-image:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update base rollout image
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          ROLL_FILE="app/base/rollout.yaml"
          OLD_IMAGE=$(grep -o "image: schoolofdevops/vote:[^[:space:]]*" "$ROLL_FILE" | head -1)
          [ -n "$OLD_IMAGE" ] || { echo "unable to locate rollout image line"; exit 1; }
          NEW_IMAGE="image: schoolofdevops/vote:${IMAGE_TAG}"
          sed -i "s#${OLD_IMAGE}#${NEW_IMAGE}#" "$ROLL_FILE"

      - name: Update prod overlay image tag
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          PROD_FILE="app/overlays/prod/kustomization.yaml"
          OLD_TAG=$(grep -o "newTag: [^[:space:]]*" "$PROD_FILE" | head -1)
          [ -n "$OLD_TAG" ] || { echo "unable to locate newTag line"; exit 1; }
          NEW_TAG="newTag: ${IMAGE_TAG}"
          sed -i "s#${OLD_TAG}#${NEW_TAG}#" "$PROD_FILE"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PAT_FOR_PR }}
          commit-message: "chore: bump vote image to ${{ github.event.inputs.image_tag }}"
          title: "ci: bump vote image to ${{ github.event.inputs.image_tag }}"
          body: |
            ## Summary
            - bump `schoolofdevops/vote` to `${{ github.event.inputs.image_tag }}`
            - update the prod overlay image override
          branch: cn-bump-vote-image-${{ github.sha }}
          base: main
          labels: autotune

  # Auto job: runs after merge to main, counted as production deployment
  deploy-prod:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # put your real deploy command here
