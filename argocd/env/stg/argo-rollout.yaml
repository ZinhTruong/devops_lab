apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insta-stg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: insta

  source:
    repoURL: https://github.com/ZinhTruong/devops_lab.git
    targetRevision: main
    path: argo-rollout/overlays/stg

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true