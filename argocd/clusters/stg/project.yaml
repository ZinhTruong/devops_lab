apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: insta
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"

spec:
  description: insta staging only

  sourceRepos:
  - '*'

  destinations:
  - namespace: staging
    server: https://kubernetes.default.svc

  clusterResourceWhitelist:
  - group: '*'
    kind: '*'