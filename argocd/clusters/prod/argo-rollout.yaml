apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollout-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ZinhTruong/devops_lab
    targetRevision: main
    path: argo-rollout/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
